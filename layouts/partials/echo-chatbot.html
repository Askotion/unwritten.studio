{{/* Echo Chatbot Widget - Fixed bottom-right */}}

<!-- Chatbot Toggle Button (Glass Sphere) -->
<div id="echo-widget" class="fixed bottom-6 right-6 z-50">
  <button
    id="echo-toggle"
    class="echo-sphere group relative"
    aria-label="Open Echo chat"
    x-data="{ tooltip: false }"
    @click="document.getElementById('echo-modal').classList.remove('hidden'); document.getElementById('echo-modal').classList.add('flex')"
    @mouseenter="tooltip = true"
    @mouseleave="tooltip = false"
  >
    <!-- Glass Sphere with Gradient -->
    <div class="echo-sphere-inner">
      <svg class="echo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Echo wave symbol -->
        <path d="M12 3v2m0 14v2M5.636 5.636l1.414 1.414m11.314 11.314l1.414 1.414M3 12h2m14 0h2M5.636 18.364l1.414-1.414M18.364 5.636l1.414 1.414"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>

    <!-- Tooltip on hover -->
    <span
      x-show="tooltip"
      x-transition
      class="echo-tooltip"
    >
      Echo
    </span>
  </button>
</div>

<!-- Chatbot Modal -->
<div
  id="echo-modal"
  class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-black/20 backdrop-blur-sm"
  x-data="echoChat()"
  x-init="init()"
  @click.self="closeModal()"
>
  <div class="echo-modal-container">
    <!-- Header -->
    <div class="echo-header">
      <div class="flex items-center gap-8">
        <div class="echo-avatar">
          <img src="/echo-logo.png" alt="Echo" class="echo-logo" />
        </div>
        <div>
          <h2 class="echo-title">Echo</h2>
          <p class="echo-subtitle">Worte, die zurückkommen - verwandelt</p>
        </div>
      </div>

      <button
        @click="closeModal()"
        class="echo-close"
        aria-label="Close chat"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Messages Container -->
    <div class="echo-messages" x-ref="messages">
      <template x-for="msg in messages" :key="msg.id">
        <div :class="'echo-message echo-message-' + msg.role">
          <div
            class="echo-bubble"
            x-html="renderMarkdown(msg.content)"
          ></div>
        </div>
      </template>

      <!-- Typing Indicator -->
      <template x-if="isTyping">
        <div class="echo-message echo-message-echo">
          <div class="echo-bubble echo-typing">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </template>
    </div>

    <!-- Input Container -->
    <div class="echo-input-container">
      <input
        type="text"
        class="echo-input"
        placeholder="Lass mich dich verwandeln..."
        x-model="userInput"
        @keyup.enter="sendMessage()"
        :disabled="isTyping"
        x-ref="input"
      />
      <button
        class="echo-send"
        @click="sendMessage()"
        :disabled="isTyping || !userInput.trim()"
        :class="{ 'opacity-50 cursor-not-allowed': isTyping || !userInput.trim() }"
        aria-label="Send message"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
